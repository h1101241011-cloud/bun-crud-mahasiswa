<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="/mahasiswa" class="text-gray-500 hover:text-gray-700">← Kembali</a>
    <h2 class="text-2xl font-bold text-gray-800">Tambah Mahasiswa</h2>
  </div>

  <div class="bg-white rounded-xl shadow p-6">
    <form method="POST" action="/mahasiswa/store">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
        <input
          name="nama"
          placeholder="Masukkan nama mahasiswa"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Jurusan</label>
        <input
          name="jurusan"
          placeholder="Contoh: Sistem Informasi"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Angkatan</label>
        <input
          name="angkatan"
          type="number"
          placeholder="Contoh: 2023"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
      <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
        Simpan Data
      </button>
    </form>
  </div>
</div>
